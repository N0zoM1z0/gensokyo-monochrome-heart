name: Foundation CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GMH_EXPECTED_GODOT_VERSION: 4.7.1.stable.official.a13da4feb

jobs:
  verify:
    name: Godot 4.7.1 foundation gate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install virtual display prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends xauth xvfb

      - name: Install locked Godot editor
        run: ./scripts/install_godot.sh

      - name: Add Godot to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run import, validators, tests, smoke boot, and screenshots
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" ./scripts/verify_project.sh

      - name: Upload VA00 screenshot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: va00-screenshots
          path: tests/screenshots/generated/*.png
          if-no-files-found: warn
          retention-days: 14
